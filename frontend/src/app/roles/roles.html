<div class="container">
  <h2>Gestión de Roles</h2>

  <!-- Formulario -->
  <div class="p-fluid p-formgrid p-grid">
    <div class="p-field p-col-12 p-md-6" style="display: flex; flex-direction: column; padding: 10px; width: 20%; margin: auto; gap: 10px;">
      <label for="nombre">Nombre del rol</label>
      <input id="nombre" type="text" pInputText [(ngModel)]="rol.nombre" name="nombre" placeholder="Nombre del rol" required>
        <div class="p-field p-col-12 p-md-6">
        <button pButton type="button" label="{{ editMode ? 'Actualizar' : 'Agregar' }}" (click)="guardar()"></button>
        <button *ngIf="editMode" pButton type="button" label="Cancelar" class="p-button-secondary" (click)="limpiarFormulario()"></button>
        </div>
    </div>
  </div>

  <!-- Lista de Roles -->
  <p-table [value]="roles" [paginator]="true" [rows]="5" [responsiveLayout]="'scroll'">
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-r>
      <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.nombre }}</td>
        <td>
          <button pButton type="button" icon="pi pi-pencil" class="p-button-rounded p-button-success p-mr-2" (click)="editar(r)"></button>
          <button pButton type="button" icon="pi pi-trash" class="p-button-rounded p-button-danger" (click)="eliminar(r.id)"></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
